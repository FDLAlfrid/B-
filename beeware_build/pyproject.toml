[tool.briefcase]
project_name = "bilibili_query"
bundle = "org.test"
version = "1.0.0"
description = "B站BV号查询工具"
long_description = """查询B站视频信息，支持单BV查询、BV/AV互转、批量查询"""
url = "https://github.com/FDLAlfrid/B-"
author = "FDLAlfrid"
author_email = "example@example.com"
license = "MIT"
requires = [
    "requests>=2.31.0",
]

[tool.briefcase.app.bilibili_query]
formal_name = "B站BV号查询"
description = "B站BV号查询工具"
icon = "resources/icon"
sources = ["src/bilibili_query"]
test_sources = ["tests"]

[tool.briefcase.app.bilibili_query.macOS]
requires = [
    "toga-cocoa>=0.3.0",
]

[tool.briefcase.app.bilibili_query.linux]
requires = [
    "toga-gtk>=0.3.0",
]

[tool.briefcase.app.bilibili_query.windows]
requires = [
    "toga-winforms>=0.5.0",
]

[tool.briefcase.app.bilibili_query.android]
requires = [
    "toga-android>=0.5.0",
]

[tool.briefcase.app.bilibili_query.iOS]
requires = [
    "toga-iOS>=0.3.0",
]

[tool.briefcase.app.bilibili_query.web]
requires = [
    "toga-web>=0.3.0",
]
